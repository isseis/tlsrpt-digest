name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Check if changes require running tests/build
  check-changes:
    name: Check changed files
    runs-on: ubuntu-latest
    outputs:
      has-code-changes: ${{ steps.check.outputs.has-code-changes }}
      has-devcontainer-changes: ${{ steps.check.outputs.has-devcontainer-changes }}
      has-integration-changes: ${{ steps.check.outputs.has-integration-changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: check
        run: |
          # Get list of changed files
          # Use PR base/head SHAs from the event payload to avoid relying on
          # origin/main being locally available (fails for fork PRs).
          changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          echo "Changed files:"
          echo "$changed_files"

          # Write changed files to a temp file and delegate to the classify script.
          tmp=$(mktemp)
          trap 'rm -f "$tmp"' EXIT
          echo "$changed_files" > "$tmp"
          bash .github/scripts/classify-changes.sh "$tmp"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint security scan (gosec)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          # Use "sarif:filename" format so golangci-lint writes the file itself
          # rather than relying on shell redirection, which can leave a
          # truncated (invalid) JSON file when the process is killed.
          args: >-
            --disable-all
            --enable gosec
            --build-tags test
            --out-format sarif:golangci-security.sarif
            --timeout=5m
            ./...
        continue-on-error: true

      - name: Upload golangci-lint security SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('golangci-security.sarif') != '' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: golangci-security.sarif

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != '' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: 'trivy-results.sarif'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tlsrpt-digest
          path: build/tlsrpt-digest
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

  lint:
    name: Code Quality & Lint
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint (default config)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --build-tags test --timeout=5m

      - name: golangci-lint (security config)
        run: golangci-lint run --config .golangci-security.yml --build-tags test --timeout=5m

      - name: Verify modules
        run: |
          go mod tidy
          if [ -n "$(git diff --name-only)" ]; then
            echo "ERROR: go mod tidy resulted in changes:"
            git diff
            exit 1
          fi
          echo "PASS: go mod tidy check completed"

  devcontainer-build-test:
    name: Devcontainer Build Test
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-devcontainer-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create stub mounts required by docker-compose.yml
        run: |
          # SSH public key (read-only mount)
          mkdir -p ~/.ssh && touch ~/.ssh/id_ed25519.pub
          # GitHub CLI config directory
          mkdir -p ~/.config/gh
          # Claude config directory
          mkdir -p ~/.claude
          # Codex config directory
          mkdir -p ~/.codex
          # SSH agent socket (macOS host-services path referenced in docker-compose)
          sudo mkdir -p /run/host-services
          sudo touch /run/host-services/ssh-auth.sock

      - name: Build devcontainer and verify toolchain
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/amd64/devcontainer.json
          runCmd: |
            go version
            golangci-lint --version
            gh --version
            pre-commit --version

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-integration-changes == 'true'
    services:
      greenmail:
        image: greenmail/standalone:2.1.3
        env:
          GREENMAIL_OPTS: "-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=imap-test:imap-test@example.com -Dgreenmail.users.login=email"
        ports:
          - "3993:3993"
          - "3025:3025"
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/3993'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
    env:
      IMAP_TEST_HOST: localhost
      IMAP_TEST_PORT: "3993"
      IMAP_TEST_SMTP_HOST: localhost
      IMAP_TEST_SMTP_PORT: "3025"
      IMAP_TEST_USER: imap-test@example.com
      IMAP_TEST_PASS: imap-test
      IMAP_TEST_MAILBOX: INBOX
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        run: make test-integration

  non-code-only-notification:
    name: Non-code changes only detected
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'false' && needs.check-changes.outputs.has-integration-changes == 'false'
    steps:
      - name: Notify non-code-only changes
        run: |
          echo "This pull request contains only non-code changes (docs, LICENSE, etc.)."
          echo "Skipping all CI jobs to save resources."
