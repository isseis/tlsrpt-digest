name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Check if changes require running tests/build
  check-changes:
    name: Check changed files
    runs-on: ubuntu-latest
    outputs:
      has-code-changes: ${{ steps.check.outputs.has-code-changes }}
      has-devcontainer-changes: ${{ steps.check.outputs.has-devcontainer-changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: check
        run: |
          # Get list of changed files
          # Use PR base/head SHAs from the event payload to avoid relying on
          # origin/main being locally available (fails for fork PRs).
          changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          echo "Changed files:"
          echo "$changed_files"

          # Files that do not require running tests:
          #   - *.md (documentation)
          #   - docs/ (documentation)
          #   - .devcontainer/ (dev environment config)
          #   - LICENSE
          code_files=$(echo "$changed_files" | grep -vE '(\.md$|^docs/|^\.devcontainer/|^LICENSE$)' || true)

          if [ -z "$code_files" ]; then
            echo "has-code-changes=false" >> $GITHUB_OUTPUT
            echo "No code changes detected, skipping tests"
          else
            echo "has-code-changes=true" >> $GITHUB_OUTPUT
            echo "Code changes detected, running tests"
          fi

          # Check if devcontainer files were changed
          if echo "$changed_files" | grep -q '^\.devcontainer/'; then
            echo "has-devcontainer-changes=true" >> $GITHUB_OUTPUT
            echo "Devcontainer files changed, running devcontainer build test"
          else
            echo "has-devcontainer-changes=false" >> $GITHUB_OUTPUT
            echo "No devcontainer changes, skipping devcontainer build test"
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Run golangci-lint security scan (gosec)
        run: |
          # Use "sarif:filename" format so golangci-lint writes the file itself
          # rather than relying on shell redirection, which can leave a
          # truncated (invalid) JSON file when the process is killed.
          golangci-lint run \
            --enable gosec \
            --disable-all \
            --build-tags test \
            --out-format sarif:golangci-security.sarif \
            --timeout=5m \
            ./...
        continue-on-error: true

      - name: Upload golangci-lint security SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('golangci-security.sarif') != '' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: golangci-security.sarif

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != '' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: 'trivy-results.sarif'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tlsrpt-digest
          path: build/tlsrpt-digest
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

  lint:
    name: Code Quality & Lint
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint (default config)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --build-tags test --timeout=5m

      - name: golangci-lint (security config)
        run: golangci-lint run --config .golangci-security.yml --build-tags test --timeout=5m

      - name: Verify modules
        run: |
          go mod tidy
          if [ -n "$(git diff --name-only)" ]; then
            echo "ERROR: go mod tidy resulted in changes:"
            git diff
            exit 1
          fi
          echo "PASS: go mod tidy check completed"

  devcontainer-build-test:
    name: Devcontainer Build Test
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-devcontainer-changes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create stub mounts required by docker-compose.yml
        run: |
          # SSH public key (read-only mount)
          mkdir -p ~/.ssh && touch ~/.ssh/id_ed25519.pub
          # GitHub CLI config directory
          mkdir -p ~/.config/gh
          # Claude config directory
          mkdir -p ~/.claude
          # SSH agent socket (macOS host-services path referenced in docker-compose)
          sudo mkdir -p /run/host-services
          sudo touch /run/host-services/ssh-auth.sock

      - name: Build devcontainer and verify toolchain
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/amd64/devcontainer.json
          runCmd: |
            go version
            golangci-lint --version
            gh --version
            pre-commit --version

  non-code-only-notification:
    name: Non-code changes only detected
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'false'
    steps:
      - name: Notify non-code-only changes
        run: |
          echo "This pull request contains only non-code changes (docs, .devcontainer, LICENSE, etc.)."
          if [ "${{ needs.check-changes.outputs.has-devcontainer-changes }}" = "true" ]; then
            echo "Running devcontainer build test. Skipping security scans, build, and Go tests."
          else
            echo "Skipping all CI jobs to save resources."
          fi
