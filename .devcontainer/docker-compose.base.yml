services:
  dev-env:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - IMAP_TEST_HOST=greenmail
      - IMAP_TEST_PORT=3143
      - IMAP_TEST_USER=imap-test@example.com
      - IMAP_TEST_PASS=imap-test@example.com
      - IMAP_TEST_MAILBOX=INBOX
      - IMAP_TEST_SMTP_HOST=greenmail
      - IMAP_TEST_SMTP_PORT=3025
    volumes:
      - ..:/workspaces/ubuntu:cached
      # Share SSH authentication socket/keys for Git operations
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
      - ~/.ssh/id_ed25519.pub:/home/devuser/.ssh/id_ed25519.pub:ro
      - ~/.ssh/id_ed25519:/home/devuser/.ssh/id_ed25519:ro
      # Share GitHub CLI and Claude credentials for seamless authentication in the container
      - ~/.config/gh:/home/devuser/.config/gh
      - ~/.claude:/home/devuser/.claude
    # Keep the container running
    command: /bin/sh -c "while sleep 1000; do :; done"
    depends_on:
      greenmail:
        condition: service_healthy

  # In-memory IMAP/SMTP server for integration tests.
  # Accessible from dev-env as hostname "greenmail".
  # Users are created automatically on first SMTP delivery; password = email address.
  greenmail:
    image: greenmail/standalone:2.1.3
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0
    ports:
      - "127.0.0.1:3143:3143"  # IMAP
      - "127.0.0.1:3025:3025"  # SMTP (test data injection)
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/3143"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
