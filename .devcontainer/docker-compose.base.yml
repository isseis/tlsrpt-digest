services:
  dev-env:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - IMAP_TEST_HOST=greenmail
      - IMAP_TEST_PORT=3993
      - IMAP_TEST_USER=imap-test@example.com
      - IMAP_TEST_PASS=imap-test
      - IMAP_TEST_MAILBOX=INBOX
      - IMAP_TEST_SMTP_HOST=greenmail
      - IMAP_TEST_SMTP_PORT=3025
    # Codex and other sandboxed tooling use bubblewrap, which needs to create
    # user namespaces inside the devcontainer. Docker's default seccomp profile
    # can block that and cause "bwrap: No permissions to create a new namespace".
    # Keep this scoped to the dev-env service; greenmail does not need it.
    security_opt:
      - seccomp=unconfined
    volumes:
      - ..:/workspaces/ubuntu:cached
      # Share SSH authentication socket/keys for Git operations
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
      - ~/.ssh/id_ed25519.pub:/home/devuser/.ssh/id_ed25519.pub:ro
      # Share GitHub CLI, Claude, and Codex credentials for seamless authentication in the container
      - ~/.config/gh:/home/devuser/.config/gh
      - ~/.claude:/home/devuser/.claude
      - ~/.codex:/home/devuser/.codex
    # Keep the container running
    command: /bin/sh -c "while sleep 1000; do :; done"
    depends_on:
      greenmail:
        condition: service_healthy

  # In-memory IMAP/SMTP server for integration tests.
  # Accessible from dev-env as hostname "greenmail".
  # Fixed user: imap-test@example.com / imap-test (pre-registered via GREENMAIL_OPTS).
  # SMTP delivery to unknown addresses auto-creates a mailbox with the recipient address as the password.
  greenmail:
    image: greenmail/standalone:2.1.3
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=imap-test:imap-test@example.com -Dgreenmail.users.login=email
    ports:
      - "127.0.0.1:3993:3993"  # IMAPS
      - "127.0.0.1:3025:3025"  # SMTP (test data injection)
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/3993"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
