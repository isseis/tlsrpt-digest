version: 2

before:
  hooks:
    - go mod tidy
    - bash -c 'git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum is not up to date; run go mod tidy and commit the changes" && exit 1)'

builds:
  - id: tlsrpt-digest
    main: ./cmd/tlsrpt-digest
    binary: tlsrpt-digest
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: tlsrpt-digest
    files:
      - LICENSE
      - README.md
      - README.ja.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs(\([^)]*\))?:'
      - '^test(\([^)]*\))?:'
      - '^chore(\([^)]*\))?:'
